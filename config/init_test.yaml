starting_scene_description: >
  蔷薇庄园的夏夜舞会正在进行中。水晶吊灯的光芒洒满大宴会厅，弦乐四重奏
  正演奏着一首舒缓的圆舞曲。你（艾琳大小姐）刚从藏书室出来，站在宴会厅
  的入口处。你的目光不受控制地飘向人群中那个笨拙的骑士——雷恩正手足无措地
  站在长餐桌旁，似乎在找什么东西。而维多利亚穿着一身夺目的红裙，已经端着
  酒杯朝他走去了。露台的落地窗半开着，夜风吹进了玫瑰花园的芬芳。
  老管家塞巴斯蒂安站在大厅的阴影里，像往常一样安静地观察着一切。
  今晚似乎注定不会是平静的一夜。

