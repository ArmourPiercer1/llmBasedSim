# ============================================================
# 蔷薇庄园 — 游戏初始化测试文件
# 用法: python -m src.main --init-file config/init_test.yaml
# ============================================================

# ── 世界设定 ──
world:
  name: "蔷薇庄园"
  description: >
    一座建于维多利亚时代的贵族庄园，坐落在英格兰南部的丘陵之间。
    主宅是一座三层石砌建筑，周围环绕着精心修剪的玫瑰花园。
    庄园内处处可见繁复的雕花和褪色的挂毯，空气中飘着玫瑰与旧书的气息。
    今夜，庄园正在举办一年一度的夏夜舞会。
  environment:
    time_of_day: "傍晚"
    weather: "晴朗，微风"
    temperature_c: 22.0

  # ── 地点 ──
  locations:
    # === 庄园主宅 ===
    - id: grand_ballroom
      name: "大宴会厅"
      description: >
        庄园的主宴会厅，华丽的水晶吊灯悬挂在穹顶之下，投下斑驳光影。
        擦得发亮的大理石地板上，宾客们正随着弦乐四重奏翩翩起舞。
        东侧是一排落地窗，窗外可以望见玫瑰花园的夜色。
        西侧墙壁上挂着历代罗森堡家主的画像，他们沉默地注视着这场舞会。
      connections:
        north: library
        east: garden_terrace
        west: study_door
        south: main_corridor
      ambient_light: "明亮"
      ambient_sound: "弦乐声和低语交谈声"

    - id: library
      name: "藏书室"
      description: >
        温暖而幽静的藏书室，四壁都是高及天花板的橡木书架。
        壁炉里的火苗轻轻跳动，空气中弥漫着皮革、纸页和雪松木的气息。
        一把老旧的皮质扶手椅摆在壁炉前，仿佛在等待某个人坐下来。
      connections:
        south: grand_ballroom
      ambient_light: "柔和"
      ambient_sound: "安静，只有壁炉的噼啪声"

    - id: study_door
      name: "书房门口"
      description: >
        通往庄园主书房的厚重橡木门，门上镶着铁质纹饰。
        门是锁着的——据说老爷在里面存放着重要的家族文件和私人信件。
        门上挂着一块小小的铜牌，上面刻着"非请勿入"。
      connections:
        east: grand_ballroom
        secret: servant_corridor
      ambient_light: "昏暗"
      ambient_sound: "安静"

    - id: servant_corridor
      name: "仆人通道"
      description: >
        隐藏在墙壁后面的狭窄通道，仅容一人侧身通过。这里是仆人们在不打扰主人
        的情况下穿行于宅邸各处的秘密路径。通道内光线昏暗，墙壁粗糙，
        空气里飘着灰尘和陈年木蜡的气味。
      connections:
        main: study_door
        north: library
      ambient_light: "昏暗"
      ambient_sound: "安静，偶尔有管道的水声"

    - id: garden_terrace
      name: "花园露台"
      description: >
        从宴会厅延伸而出的大理石露台，石栏杆上攀满了盛开的蔷薇藤蔓。
        站在这里可以俯瞰整座玫瑰花园。露台角落里放着几张铁艺桌椅，
        是避开舞会喧嚣、享受夜风的绝佳去处。月光洒在石板上，泛着淡银色的光。
      connections:
        west: grand_ballroom
        down: rose_garden
      ambient_light: "月光"
      ambient_sound: "夜风吹过蔷薇藤蔓的沙沙声"

    - id: rose_garden
      name: "玫瑰花园"
      description: >
        庄园引以为傲的玫瑰花园，数百株各色玫瑰在精心修剪的黄杨木篱笆间绽放。
        花园中央是一座小小的石砌喷泉，喷泉旁有一张石凳。
        碎石小径蜿蜒穿过花丛，每走几步景色便焕然一新。
        深夜时分，夜莺的歌声常常在这里回荡。
      connections:
        up: garden_terrace
        north: main_corridor
      ambient_light: "月光"
      ambient_sound: "夜莺的歌声和喷泉的水声"

    - id: main_corridor
      name: "主走廊"
      description: >
        连接庄园各个区域的主走廊，铺着褪色的红地毯，墙上装饰着家族徽章和
        古老的烛台。走廊两侧各有几扇门通向不同的房间。
      connections:
        north: grand_ballroom
        south: rose_garden
      ambient_light: "烛光"
      ambient_sound: "远处舞会的音乐声隐约传来"

  # ── 物体 ──
  objects:
    - id: crystal_chandelier
      object_type: "decoration"
      name: "水晶吊灯"
      description: "巨大的水晶吊灯，由数百颗水晶串缀而成，悬挂在宴会厅穹顶中央。灯光透过水晶折射出璀璨的光芒。"
      position: {x: 0, y: 5, z: 0}
      state: {lit: true}
      properties:
        immovable: true
        weight_kg: 300
        material: "crystal_and_brass"
        fragile_parts: "水晶挂件易碎"

    - id: banquet_table
      object_type: "furniture"
      name: "长餐桌"
      description: "一张十二人座的桃花心木长餐桌，桌面铺着雪白的亚麻桌布，上面摆满了银质餐具和水晶酒杯。"
      position: {x: 3, y: 0, z: -2}
      state: {}
      properties:
        weight_kg: 120
        material: "mahogany"
        movable_by_normal_person: false

    - id: heirloom_vase
      object_type: "decoration"
      name: "传家瓷花瓶"
      description: "一只价值连城的明代青花瓷瓶，瓶身绘着江南水乡的风景。罗森堡家族已经珍藏了它五代人。"
      position: {x: -2, y: 1.2, z: 2}
      state: {}
      properties:
        fragile: true
        weight_kg: 3
        material: "porcelain"
        value: "priceless_family_heirloom"

    - id: study_lock
      object_type: "device"
      name: "书房门锁"
      description: "一把精致的黄铜弹子锁，镶在厚重的橡木书房门上。锁孔周围有些细微的划痕——曾经有人试图撬开它。"
      position: {x: -5, y: 1, z: 0}
      state: {locked: true}
      properties:
        lock_difficulty: 0.6
        material: "brass"
        key_holder: "butler_sebastian"

    - id: fireplace_bellows
      object_type: "tool"
      name: "壁炉风箱"
      description: "一把陈旧的皮腔风箱，放在藏书室壁炉旁边。木柄已经被磨得十分光滑。"
      position: {x: 1, y: 0, z: 4}
      state: {}
      properties:
        weight_kg: 1.5
        material: "leather_and_wood"

    - id: love_letter
      object_type: "document"
      name: "一封未寄出的信"
      description: "一封被藏在藏书室某本书后面的信，信纸已经泛黄。上面是雷恩骑士的笔迹，内容似乎从未被收信人看到过。"
      position: {x: 2, y: 1.5, z: 5}
      state: {hidden: true}
      properties:
        fragile: true
        author: "knight_rain"
        intended_recipient: "eileen"
        content_hint: "情书"

    - id: iron_garden_gate
      object_type: "device"
      name: "花园铁门"
      description: "一扇通向庄园外墙的铁栅栏门，门上爬满了蔷薇藤。门轴有些生锈，推开时会发出刺耳的嘎吱声。"
      position: {x: 8, y: 0, z: -6}
      state: {closed: true, locked: false}
      properties:
        width_cm: 80
        material: "wrought_iron"
        noise_when_opened: "loud_creak"

    - id: stone_bench
      object_type: "furniture"
      name: "石凳"
      description: "玫瑰花园中央喷泉旁的一张大理石长凳，表面被岁月打磨得很光滑。"
      position: {x: 6, y: 0, z: -8}
      state: {}
      properties:
        weight_kg: 200
        material: "marble"
        movable_by_normal_person: false

# ── 玩家设定 ──
player:
  player_id: "player_1"
  name: "艾琳·冯·罗森堡"
  persona: >
    艾琳是罗森堡家族的大小姐，今年十九岁。她继承了母亲的美貌和父亲的骄傲。
    在公众场合，她永远是那个高高在上、言辞犀利的贵族千金，任何失礼的言行
    都会被她毫不留情地嘲讽。但只有贴身女仆知道，她会在深夜偷偷给流浪猫喂食，
    会把自己最喜欢的甜点留给生病的仆人，会在没有人看见的地方对着某人的信
    露出温柔的笑容。她最大的秘密是：她已经喜欢上了那个笨拙的骑士雷恩很久了，
    但她的骄傲让她永远只能用刻薄的话来掩饰自己的真心。
  position: {x: 2, y: 0, z: 0}

  capabilities:
    sight_range_m: 50.0
    hearing_range_m: 100.0
    field_of_view_degrees: 120.0
    special_senses: []
    # 不符合普通人认知但玩家可以做的事
    allowed_extraordinary_actions:
      - "通晓庄园所有秘密通道和暗门的精确位置"
      - "凭借罗森堡家族的身份，可以命令庄园内所有仆人"
    # 普通人能做但该玩家不能做的事
    blocked_common_actions:
      - "对任何人说出真诚的感谢或道歉"
      - "在舞会上当众承认自己不会跳舞"
    # 技能等级 (0.0 ~ 1.0)
    skill_levels:
      persuasion: 0.2
      lockpicking: 0.1
      etiquette: 0.9
      dancing: 0.8

  physical_profile:
    height_cm: 165.0
    weight_kg: 52.0
    body_width_cm: 40.0
    movement_mode: "walk"
    strength: 0.3

  subconscious_rules:
    - "规则1: 对喜欢的人说反话。如果心里想的是'我很高兴见到你'，嘴巴必须说'你怎么又来了，真是烦人'"
    - "规则2: 绝不先表达好感。如果对方不先示好，就要用冷漠和讽刺来武装自己"
    - "规则3: 在公众场合永远保持高傲姿态。丢脸的事情绝对不能被外人看到"
    - "规则4: 内心越是不安或感动，表面上的话就越刻薄。这是一种自我保护机制"

  subconscious_memory:
    - "去年舞会上，雷恩骑士邀请我跳舞，我红着脸说'和你跳舞简直是在浪费我的时间'，然后整晚都在后悔"
    - "上周看到维多利亚挽着雷恩的手臂在花园散步，我气得把一整盘甜点都吃完了"
    - "三年前，我偷偷给受伤的流浪猫包扎，被雷恩看见了，他笑着说'大小姐其实很温柔呢'——这是我第一次在他面前说不出刻薄话"

  speech_examples:
    - "哼，我只是恰好走到这里而已，才不是特意来看你的。"
    - "你的舞步还是一如既往的糟糕呢。不过……我今晚刚好有空，陪你练一下也不是不行。"
    - "谁、谁需要你的帮助了！我自己能处理好。"
    - "你、你不要误会了！我只是觉得这件礼服的颜色刚好和你很配而已，没有别的意思！"
    - "你问我为什么生气？我没有生气。我只是觉得某些人太迟钝了，看着就来气。"
    - "笨蛋！这么大的雨你跑过来干什么……快进来吧，我给你拿条毛巾。"

  inventory:
    - "lace_handkerchief"
    - "small_silver_key"

# ── NPC 设定 ──
characters:
  # ========== NPC 1: 雷恩骑士 ==========
  - id: knight_rain
    name: "雷恩"
    character_id: "knight_rain"
    personality:
      traits: ["正直", "勇敢", "笨拙", "温柔", "过于老实"]
      motivations:
        - "保护艾琳大小姐——尽管她总是对他恶语相向"
        - "在今晚的舞会上鼓起勇气向艾琳表白"
        - "查明罗森堡家族近期收到的一封威胁信的来源"
      speech_style: "真诚但有些拘谨，面对艾琳时容易结巴"
      background: >
        雷恩出身平民，因为在一场边境冲突中英勇救下了罗森堡老爷而受封为骑士。
        他武艺高强但极其不善言辞，尤其是面对艾琳大小姐时，舌头就像打了结。
        他来庄园已经三年了，三年来他始终默默守护着艾琳，却从不敢说出自己的心意。
        今天他终于鼓足勇气，在怀中揣了一封情书，准备在舞会上交给艾琳——
        但这封信现在不知落在藏书室哪个角落里了。
    position: {x: 4, y: 0, z: -3}
    starting_inventory: []
    relationships:
      eileen: 0.9
      victoria: -0.1
      butler_sebastian: 0.5
      old_green: 0.3
    speech_examples:
      - "大、大小姐……今晚的月色很美。我是说……嗯，很适合跳舞。"
      - "我并不是有意冒犯。我只是想……唉，我又说错话了。"
      - "这把剑是老爷赐给我的，我会用它守护这个庄园的每一个人。"
      - "你总是说我笨，但我觉得……能留在你身边，笨一点也无所谓。"

  # ========== NPC 2: 维多利亚 ==========
  - id: victoria
    name: "维多利亚·阿什顿"
    character_id: "victoria"
    personality:
      traits: ["优雅", "心机深沉", "占有欲强", "善于社交", "嫉妒心重"]
      motivations:
        - "不惜一切代价嫁给雷恩骑士，以此羞辱艾琳"
        - "在舞会上出尽风头，成为全场焦点"
        - "找到并毁掉雷恩写给艾琳的那封情书"
      speech_style: "甜美而有教养，但话中常常藏着讽刺的刺"
      background: >
        维多利亚是邻郡阿什顿伯爵的独生女，从小就在上流社交圈中长大。
        她和艾琳表面上是朋友，实际上暗地里从未停止过较量——
        谁更美、谁更受欢迎、谁先订婚。当维多利亚发现雷恩骑士似乎对艾琳
        有着特殊感情时，她决定要先下手为强。她知道艾琳性格傲娇，
        只要制造一些误会，艾琳就永远不可能主动向雷恩示好。
    position: {x: 0, y: 0, z: -3}
    starting_inventory:
      - "silk_fan"
      - "perfume_vial"
    relationships:
      eileen: -0.5
      knight_rain: 0.6
      butler_sebastian: 0.1
      old_green: -0.2
    speech_examples:
      - "哎呀，艾琳亲爱的，你今天的气色看起来……嗯，很有个性呢。"
      - "雷恩爵士，能和我说说你在边境的英勇事迹吗？我对英雄故事最没有抵抗力了。"
      - "艾琳你怎么一个人站在这里？哦我忘了，你大概不喜欢跳舞吧。"
      - "听说某人今天又说了伤人的话呢。真是的，明明是个好机会却不珍惜。"

  # ========== NPC 3: 管家塞巴斯蒂安 ==========
  - id: butler_sebastian
    name: "塞巴斯蒂安"
    character_id: "butler_sebastian"
    personality:
      traits: ["忠诚", "睿智", "沉默寡言", "洞察一切", "老派绅士"]
      motivations:
        - "守护罗森堡家族的利益和艾琳大小姐的幸福"
        - "找出是谁在暗中威胁庄园的安全"
        - "在适当的时机，用适当的暗示推动艾琳和雷恩的关系"
      speech_style: "恭敬而有分寸，措辞精准，偶尔带着长辈的温和调侃"
      background: >
        塞巴斯蒂安已经在罗森堡庄园服务了四十年。他从艾琳的爷爷那一代就开始
        做管家，对这座宅邸的每一块砖、每一条暗道、每一个秘密都了如指掌。
        他看人极准，早就察觉了艾琳和雷恩之间微妙的感情。他也注意到了
        维多利亚小姐的不怀好意，并正在暗中收集证据。
        他身上总带着一串钥匙——包括书房门的钥匙。
    position: {x: -3, y: 0, z: 3}
    starting_inventory:
      - "master_key_ring"
      - "pocket_watch"
    relationships:
      eileen: 0.8
      knight_rain: 0.6
      victoria: -0.3
      old_green: 0.4
    speech_examples:
      - "大小姐，请容我说一句——有些话，说出口比藏在心里更不容易后悔。"
      - "雷恩爵士，您要找的东西，或许就在您经常徘徊的那个房间里。"
      - "恕我多言，但维多利亚小姐的笑容，和她父亲当年算计别人时的笑容一模一样。"
      - "这串钥匙能打开庄园里每一扇门。但人心里的门，只有当事人自己才能打开。"

  # ========== NPC 4: 老格林 ==========
  - id: old_green
    name: "老格林"
    character_id: "old_green"
    personality:
      traits: ["神秘", "沉默", "与大自然的联系", "隐士", "温和但难以接近"]
      motivations:
        - "守护玫瑰花园，这是他死去妻子的遗愿"
        - "保守庄园地下古墓的秘密"
        - "观察庄园中发生的每一件事，并在关键时出手"
      speech_style: "缓慢而沙哑，喜欢用植物的比喻说话"
      background: >
        没有人知道老格林在庄园工作了多久，连塞巴斯蒂安都说"我来的时候他就在了"。
        他沉默寡言，整天在玫瑰花园里修剪枝叶、浇花除草。但他种出的玫瑰是
        全英格兰最美的。有些人说他是个退伍老兵，有人说他曾经是个魔法师，
        还有人说他是罗森堡家族的私生子。老格林从不解释。
        他有一个小小的笔记本，里面画满了奇怪的符号——有人说那是古代文字。
        如果你在深夜的花园里看到一点忽明忽暗的灯，那一定是老格林在给他的玫瑰唱歌。
    position: {x: 7, y: 0, z: -7}
    starting_inventory:
      - "gardening_shears"
      - "mysterious_notebook"
    relationships:
      eileen: 0.4
      knight_rain: 0.2
      victoria: -0.1
      butler_sebastian: 0.5
    speech_examples:
      - "这孩子……她的刺比我的玫瑰还多。但刺最多的玫瑰，开出的花往往最美。"
      - "嘘——别出声。你听到夜莺在唱歌了吗？它只在有人需要被安慰的时候唱。"
      - "年轻人，你知道玫瑰为什么有刺吗？不是为了伤害，是为了保护自己最柔软的部分。"
      - "这张石凳上，四十年前也坐过一对年轻人。他们后来结婚了。"
      - "有些秘密，连土壤都不愿意保守。所以我把它们写在了纸上，又把纸埋在了花下。"

