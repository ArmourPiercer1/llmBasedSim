      natural_delta_per_minute: 0
      description: 从死亡兄弟身上回收并藏匿的基因种子数量。每一颗都代表一个可以被继承的血天使。
    hidden_knowledge:
      name: 隐蔽知识
      value: 60
      min: 0
      max: 100
      hidden: true
      natural_delta_per_minute: 0
      description: 血天使在巢穴中被动观察四周学到的关于巨蛛族行为、巢穴结构和弱点的知识。隐藏属性。达到100时他可以提供精确的情报。
starting_scene_description: '空降舱穿过风暴层的感觉就像被一双巨大的手攥住然后反复砸向岩石。 第十三号舱的陀螺稳定仪在第二次闪电击中时就失效了—— 从那一刻起，你们不是降落，而是坠落。
      撞击。金属尖叫。肋骨在胸甲内撞得生疼。然后是寂静—— 被风暴的嗡鸣和巨草茎摇曳的呻吟填满的寂静。

      你是扫罗·塔尔维茨，帝王之子第十连的线列连长。你的空降舱 裂成了三块。你的通讯设备烧成了废铁。你的头盔显示器花了整整两分钟 才重新亮起来——而当它亮起来时，你看到的是这片灰白色的草茎海洋， 无边无际，在破裂的舱体外摇曳，像是在欢迎你来到一个从未被人类征服过 的世界。

      三个小时。你们用了三个小时重新集结——三十几个战士从散落在 数公里范围内的碎片中挣扎出来。有些人还活着。有些人不是。 卢修斯在你的右侧，他正在用一块碎布擦拭他战斗刀上的绿色黏液—— 嘴角挂着一个让你不安的微笑。布勒在你的左侧，沉默地清点着实弹。 萨基安的右臂断了，但他用左手在尝试修复一台便携通讯器—— 一遍又一遍，每次都摇头。

      艾多伦大人的信号消失了。血天使的信号消失了——自从你到达 这片星空之前就消失了。第140远征舰队已经在这里耽误了太久， 久到他们派人来救援，久到救援的人也需要被救援。

      草茎在风中颤抖——不是被风吹的，而是被某种东西的信号触发。 幼虫的嘶嘶声突然停止了。然后你听到了那个声音：一种如同金属刮擦 金属的、快速的、锯齿般的撞击声——从四面八方传来的脚步声， 不是人类的脚，而是锋利的、末端是天然刀刃的肢足在锈红色土壤上 奔跑。

      你握紧爆弹枪，朝卢修斯的方向点了一下头。

      "接触。左翼。三只——不，五只。"

      卢修斯笑着举起了他的战斗刀。"让我来。"

      在这个叫"谋杀"的世界上，你的第一次战斗持续了十二秒。 十二秒后，你有两个战士死了。巨蛛族失去了两条肢体——然后消失了， 像它们来时一样突然。草茎恢复摇曳。幼虫恢复嘶鸣。仿佛什么都没发生过。

      但你已经明白了。你知道为什么从那个血天使连长最后的通讯里 只能听清三个字了。

      这个世界。是。谋杀。'
max_ticks: 75
game_time:
  hour: 18
  minute: 30
ticks_per_game_minute: 0.5
world_rules:
  physics:
    disable: []
    append:
    - 11. **离子风暴干扰**：谋杀星的电离风暴对所有电子设备和通讯造成持续性干扰。远距离（超过1公里）的无线电通讯自动失效，除非在风暴暂停区域（棘刺树被摧毁后形成的风眼）内。
    - 12. **棘刺树与天气关联**：白石化棘刺巨树是巨蛛族控制天气的生物发生器。摧毁一棵或一群棘刺树会导致该区域内风暴暂停，天空暂时放晴，为轨道通讯和空降提供窗口。
    - 13. **巨蛛族幼虫预警系统**：当巨蛛族战士形态靠近时，附着在草茎根部的黑色幼虫囊会突然停止嘶嘶声，同时巨草茎开始快速高频颤栗。这是一种提前预警信号——但只给5到10秒的反应时间。
    - 14. **巨蛛族尸体回收**：巨蛛族会迅速回收战场上同类的尸体和断肢。任何被留在战场上的巨蛛族尸体（超过30分钟未被回收）要么意味着该区域被它们放弃，要么意味着有某种更强的力量阻止了它们——两种情况都值得调查。
    - 15. **胶结物腐蚀性**：巨蛛族工蚁形态分泌的乳白色胶结物在新鲜状态下具有强腐蚀性——接触未凝固的胶结物会导致动力甲陶瓷层被缓慢侵蚀。完全凝固后则形成接近钻石硬度的惰性物质。
  attribute:
    disable: []
    append:
    - 在巨蛛族幼虫区域停留时：lucidity每tick下降1-2点（持续的低频嘶嘶声对被基因强化的阿斯塔特感官有不可解释的干扰效应）。
    - 摧毁一棵棘刺树时：所有在场角色的resolve恢复5-10点，小队凝聚力上升3-5点（破坏异形结构的象征性胜利）。
    - 在地下巢穴（underground_nest_entrance、brood_chamber）中时：storm_tolerance每tick下降1-3点（因暴露于浓缩的生物毒素和高强度电离辐射中）。
    - 每当回收一具阿斯塔特遗体的基因种子时：gene_seed_samples上升1-3点，honor_integrity上升1-2点；如果放弃回收可能的情况则honor_integrity下降5-10点。
    - 每有一位战友在战斗中阵亡：squad_cohesion下降3-5点，resolve下降1-2点；如果阵亡是艾多伦的错误命令导致，全员对艾多伦的好感下降0.05-0.1。
narrative_style:
  style_description: "战锤40K宇宙的军事科幻恐怖风格。叙述应当冷峻、克制、带着沉重的压力和逐步逼近的恐惧。巨蛛族不是传统的异形入侵者——它们是生物工业的产物，没有任何情感或动机可以被人类理解。它们只是制造、收割、扩张。这种不可理解性——比对抗一个有欲望的敌人更令人不安。以第二人称'你'（扫罗·塔尔维茨）的视角叙述，但叙述声音应当像一个冷静的、受过军事训练的观察者——不带多余的修饰，让事实本身的恐怖感自然浮现。重点不在于血腥本身，而在于面对一个完全无法沟通、无法威慑、永无止境的异形生态系统时的无力感与坚持之间的张力。"
  style_example: "草茎的嘶嘶声停了。\n\n这意味着它们在靠近。你用了三次接触才学会这个信号——而现在这个信号让你的骨髓比大脑更早地做出了反应。你把爆弹枪举到齐肩高度，左手压在弹夹护盖下方，食指滑过扳机护圈。在巨草茎的灰白色帷幕后面，你看到了一道银色的闪光——不是武器，而是一条前肢，一条天生就是剑的肢干。\n\n卢修斯在你旁边站直了身体。他脱下了头盔，面朝那尚不可见的敌人。他的眼睛——那种属于天才和疯子共有的一种亮光——在昏暗的光线下几乎像两颗暗色的火。\"让我来，\"他说，声音轻得像在自言自语。\n\n你没有回答。你想说这不是竞技场，这不是证明谁更优秀的时刻。但你了解卢修斯。他是你的朋友。这意味着你知道他会做什么——以及你不会阻止他。\n\n那道银色闪光再次掠过——这次更近了。草茎没有摇曳。它们颤栗。\n\n然后是萨基安的声音，平静得像在报告天气：\"连长。左翼。至少十二只。\"\n\n十二只。前两次接触从没超过五只。你的小队只有三十几个人。两名已经在第一次战斗中阵亡。还有人在流血。\n\n你把爆弹枪的射击模式从单发切换到了三连发。\n\n\"卢修斯，\"你说，\"这次我们一起。\"\n\n他回头看了你一眼。那个微笑。那个你之后会在噩梦中看到的微笑。\n\n他仍然没有说话。他只是点了点头，然后把战斗刀翻到反手——刀尖朝下，刃朝外——这是他的标志性起手势。\n\n在灰白色草茎帷幕的颤栗中，在红铁色大地的呻吟中，在那些无声的天生刀刃刺破空气的嘶鸣中，你向前迈出了一步。\n\n他们是你的兄弟。你是他们的连长。这只是一个开始。"
