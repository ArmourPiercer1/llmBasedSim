    speech_style: 轻松、自信、带着一丝嘲讽的意味。他说话的时候像是在和整个世界开一个只有他自己懂的笑话。当他突然变得极度认真时——嗓音会变得低沉而近乎温柔——那才是最可怕的时刻。
    background: '卢修斯是帝王之子第十连的另一位连长——比塔尔维茨更年轻， 但剑术已经超出了大部分资深远征老兵。他的天赋是不容置疑的。 他的自负也是。塔尔维茨和卢修斯是老朋友，但这友谊的天平 是倾斜的：塔尔维茨明白卢修斯总有一天会在军阶和荣誉上 超越他，而他对此并不在意。卢修斯不懂塔尔维茨为什么 不"追求更多"——在他看来，满足于当线列军官是不可理解的。
      在谋杀星的第一战中，卢修斯砍下一只巨蛛族的刀肢并举起来 当战利品挥舞——直到刀肢割穿了他的手套。这不是愚蠢。 这是对异形的某种隐秘的迷恋。塔尔维茨看到了，并且记住了。

      '
