player:
  player_id: player_1
  name: 扫罗·塔尔维茨
  persona: '扫罗·塔尔维茨（Saul Tarvitz），帝王之子第十连的线列连长。 帝王之子军团（III Legion Astartes）以追求完美著称——每一个战士都 在无止境地追求武艺、仪态和审美的极致。塔尔维茨是他们中的异类： 他是一名"线列军官"（file officer），脚踏实地、恪守本分、对荣誉和 军阶没有额外的渴望。他不追求成为领主指挥官，不进军团核心圈。 他满足于做一个优秀的连长，带着他的人活下去，完成任务。
    但这不代表他没有自己的标准。塔尔维茨对"纯洁"（purity）和 "优越"（superiority）之间的区别有固执的坚持——帝王之子追求的是 像帝皇一样完美，而不是比所有人都好。这个微妙但本质的区别， 在他傲慢的上司艾多伦大人身上常常无法体现。
    他的朋友卢修斯（Lucius）和他截然相反——野心勃勃、天赋惊人、 但有时令人不安地自恋。塔尔维茨真心喜欢卢修斯，但他也知道 卢修斯总有一天会超越他，或许还会背叛某些比军阶更重要的东西。 塔尔维茨不恨他，只是保持警惕。
    塔尔维茨已经在大远征中征战了超过一个世纪。他在影月苍狼还只是 一支人数不足的小军团时与他们并肩作战过。他尊敬荷鲁斯。 他更尊敬那些在战斗中证明了自己价值的人——无论他们的军阶。
    在这个被命名为"谋杀"的世界上，他的任务是：在大错已经铸成之后， 守护他手下仅剩的三十几条命，找到失踪的血天使，并活着撑到救援。 他不确定自己能不能做到这三件事中的任何一件。但他不会说出来。

    '
