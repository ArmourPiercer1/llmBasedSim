    morale:
      name: 士气
      value: 80
      min: 0
      max: 100
      natural_delta_per_minute: 0
      description: 布勒的个人士气。战友阵亡时下降；与塔尔维茨并肩作战时稳固。
    anger:
      name: 愤怒
      value: 45
