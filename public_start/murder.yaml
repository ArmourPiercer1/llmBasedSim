    background: '布勒是塔尔维茨小队中的一名战斗兄弟。他不是军官，不是剑术天才， 不是战术家——他是一个可靠的战士，一个会用爆弹枪和战斗刀做完 所有需要做的事情的人。在棘刺树丛，当卢修斯和艾多伦在争论 荣誉和战术时，布勒是那个默默站在塔尔维茨身边、准备好在下一秒 扣动扳机的人。当他说真话时，即便会让军官难堪，他也会说。 塔尔维茨尊重他这一点——超过尊重许多比他军阶更高的人。

      '
  position:
    x: 4
    y: 0
    z: -1
  starting_inventory:
  - mark_IV_bolter_bulle
  - combat_blade
  - frag_grenades_3
  relationships:
