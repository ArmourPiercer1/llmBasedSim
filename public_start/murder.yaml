    - 修复坠毁通讯设备以联系舰队
    - 活着回去看他的家乡星球——哪怕只是一次
    speech_style: 只有在技术相关时才开口。平时几乎沉默。但当他说话时——声音出奇地平静，像是在陈述事实而非表达情感。
    background: '萨基安是塔尔维茨队伍中的技术专家——负责通讯、爆破装置设置 和战场电子对抗。在棘刺树遭袭时，一只有翼巨蛛族砸断了他的右臂。 他的基因强化代谢正在修复骨骼，但这个过程还有几个小时。 在此期间，他的右臂只能勉强活动——但他拒绝被当作伤员对待。 他用左手学会了单手装填爆弹枪。塔尔维茨让他负责操作爆炸装药， 这样至少不需要两只手臂都用上。

      '
  position:
    x: 3
    y: 0
    z: 1
  starting_inventory:
