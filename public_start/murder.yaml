world:
  name: 谋杀星
  description: '第一百四十之二十号世界，远征舰队登记册上的正式编号。但给它命名的 那个血天使连长——在他最后一条能辨识的通讯里——只说了三个字： "This. World. Is. Murder."（这个世界，是谋杀。）
      谋杀星是这颗黄色太阳的第四行星。一颗被狂暴的离子风暴永久包裹的死亡世界， 赤铁色的土壤上生长着二十米高的灰白色巨草茎林，以及在暗处发出微光的 白石化石般的棘刺巨树。空气中弥漫着放射性尘埃，每一次呼吸都像在吞咽碎玻璃。
      这里没有可以谈判的文明，没有可以征服的城市，没有可以劝降的敌人。 只有它们——megarachnid（巨蛛族）——一种将生物与科技无缝融合的异形种族。 它们的盔甲就是甲壳，武器就是肢体，工业就是筑巢。帝国将它们称为异形。 它们将帝国称为猎物。
      第140远征舰队的三连血天使已经在某处失踪。帝王之子的整整一连降落， 被风暴撕成碎片，散落在这片无边无际的草茎海洋中。而你， 扫罗·塔尔维茨，帝王之子第十连的线列连长，正带领着三十几个幸存者 寻找那些来此救援却反被吞噬的兄弟们——以及一条活路。

    '
  environment:
    time_of_day: 暴风雨下的黄昏（无法分辨昼夜）
    weather: 持续的电离风暴，间歇性闪电，放射性雾霾
    temperature_c: -5.0
  locations:
  - id: drop_site
    name: 降落点残骸区
    description: '一片被破坏的巨草茎林——第十三号空降舱的撞击在这里砸出了一个 直径五十米的焦黑弹坑。舱体本身已经裂成三块，内部的弹药架和医疗补给 散落一地。周围的巨草茎被冲击波折断，歪斜地搭在弹坑边缘，像一排排 倒下的廊柱。风暴中的闪电不时照亮这个区域，每一次闪光都把所有影子 拉得极长极尖。你的三十几名战士在这里完成了重新集结——这是三个小时 前的事了。空气中弥漫着臭氧和烧焦金属的气味。

      '
    connections:
      north: stalk_forest_deep
      east: first_thorn_tree
    ambient_light: 风暴闪电的间歇性白光照亮弹坑，其余时间几乎全黑
    ambient_sound: 风暴的持续嗡鸣、巨草茎摇曳的吱嘎声、远处幼虫的嘶嘶声
  - id: stalk_forest_deep
    name: 巨草茎林深处
    description: '一片无边无际的灰白色巨草茎海洋。每一根草茎都粗如人的大腿，笔直地 向上攀升至二十米高，在头顶处交织成一片密不透光的顶篷。地面上铺满了 赤红色的铁锈土，踩上去像走在细碎的骨渣上。草茎根部密密麻麻地附着着 黑色的幼虫囊——每一个都有成年人的头颅大小，它们发出一种诡异的、 如同垂死喘息般的嘶嘶声。横向能见度不超过五六米，任何方向看起来都 完全一样。放射性风暴在顶篷之上咆哮，而在地面上，空气沉闷得令人窒息。

      '
    connections:
      south: drop_site
      west: wrecked_pod_chain
      deeper: rift_valley_edge
    ambient_light: 极其昏暗，仅有风暴透过草茎顶篷的微弱的蓝白色闪烁
    ambient_sound: 无处不在的幼虫嘶嘶声、草茎摇曳的呻吟般声响、远处如金属刮擦般的未知声源
  - id: first_thorn_tree
    name: 第一棵棘刺树
    description: '巨草茎林中的一片诡异空地。一棵高达五十米的白色石树矗立在空地中央—— 它的形状像一朵巨型的石蘑菇，宽阔的半球形树冠由成千上万根尖锐的 石化棘刺编织而成，每一根棘刺都有两三米长。树冠上挂着十几具被刺穿 的尸体——紫色的动力甲碎片在风暴闪光下微微反光。他们是帝王之子， 你的兄弟。那些有翼的巨蛛族把它们挂在这里，像屠夫把肉挂在钩子上。 尸体已经被啃食得不成形状。空气中有一股令人作呕的甜腥味—— 那是阿斯塔特血液中混合了巨蛛族溶液的腐败气味。树下散落着几片 紫色的陶瓷甲碎片和一支已经打空了的爆弹枪。

      '
    connections:
      west: drop_site
      deeper: thorn_tree_grove
    ambient_light: 树冠上的石化棘刺在风暴闪光下折射出暗淡的灰白色微光
    ambient_sound: 巨草茎在风中诡异的颤栗声、棘刺树上残余血肉滴落的黏腻声响、远处有翼形态的嗡鸣
  - id: wrecked_pod_chain
    name: 空降舱碎片链
    description: '一条散落在一公里长范围内的空降舱碎片轨迹。至少五个空降舱在穿过 风暴层时被电离击穿，在落地前就已经解体——舱体碎片、扭曲的金属板、 烧焦的线缆和偶尔一具碎裂的动力甲散落在这条死亡走廊上。风暴在这里 似乎格外猛烈，闪电的频率高于周围区域，空气中有一种令人不安的静电感—— 仿佛有什么东西在主动干扰这片区域的天气。在一堆扭曲的舱体残骸中， 你发现了两具仍然完整的阿斯塔特遗体：一名帝王之子（甲上的标识显示 他是安泰俄斯队长的战士）和一名血天使——他胸甲上的第九军团标记 依然可见。他们不是被异形杀死的。他们死于空降舱的解体。

      '
    connections:
      east: stalk_forest_deep
      north: eidolon_landing_zone
    ambient_light: 频繁的闪电照亮碎片原，光线惨白刺眼
    ambient_sound: 高频率的雷电爆裂声、金属残骸在风中相互撞击的声响
  - id: eidolon_landing_zone
    name: 艾多伦大人的降落区
    description: '另一片被空降舱撞击清理出的空地，比你的降落点更大、更混乱。 至少有六架空降舱在这里着陆——其中三架已经彻底焚毁。显然， 艾多伦大人（Lord Commander Eidolon）的主力部队在这里着陆时 遭到了巨蛛族有组织的伏击。舱体上布满利刃劈砍的痕迹，地面散落着 紫色的动力甲碎片和巨蛛族的肢体碎段。一具巨大的有翼巨蛛族尸体 倒挂在舱体边缘——它的翼膜被爆弹撕成了筛子，绿色的体液已经 凝结成块。没有发现幸存者。但也没有找到艾多伦本人的遗体。

      '
    connections:
      south: wrecked_pod_chain
    ambient_light: 焚毁舱体中的残余火光提供微弱的橙黄色照明
    ambient_sound: 金属冷却的咔嗒声、风中飘荡的焦糊味、远处越来越近的振翅声
  - id: thorn_tree_grove
    name: 棘刺树丛
    description: '六棵白石化棘刺树排成一片寂静的树丛，矗立在一片被赤铁色沼泽包围的 低洼地带。这里的土地湿软黏滑，靴子踩上去会陷入脚踝深的橙红色锈水中。 长条形的浅湖像大地的爪痕一样散布在树丛之间，湖面倒映着头顶的闪电。 空气中飞舞着大量纤维状的灰色飞虫，它们无休止地旋转、盘旋， 像一片活着的雾。更大的飞行生物——某种小型的飞行异形——在飞虫群中 穿梭捕食。棘刺树上挂着更多的尸体：血天使、帝王之子、帝国陆军士兵。 但在这些尸体之中有三棵树上挂着的不是人类残骸——而是巨蛛族自身的 尸体，被某种更强大的力量撕碎后钉在了树上。这不像是人类的作为。

      '
    connections:
      shallower: first_thorn_tree
      down: underground_nest_entrance
    ambient_light: 棘刺树的微光被锈水湖面反射，形成诡异的橙红色光晕
    ambient_sound: 飞虫群的集体嗡鸣、锈水湖面冒泡的汩汩声、远处有翼巨蛛族振翅的低频轰响
  - id: rift_valley_edge
    name: 裂谷边缘
    description: '巨草茎林在这里戛然而止。你站在一片广阔高原的边缘，俯瞰着下方 一条巨大的裂谷盆地。谷底的植被更加稀疏，取而代之的是成千上万 的锥形小石树——每棵十几米高，像真菌一样密布在盆地底部。 这些小树由同一种乳白色胶结物构成，正是那些棘刺巨树的材质。 从边缘望去，裂谷中可以看到几条被强行开凿出来的宽阔通道—— 那更像是某种巨型生物的痕迹。谷底的最深处，风暴的闪电频率 反常地密集，一道道白紫色的电弧持续不断地劈向同一个区域， 仿佛那里有什么东西在吸引——或者说召唤——着闪电。 无线电在这里完全失效，只有白噪音和某种有节奏的、如同心跳 般的脉冲信号。

      '
    connections:
      shallower: stalk_forest_deep
      down: rift_valley_floor
    ambient_light: 裂谷上方天空被闪电持续照亮，惨白得如同白昼
    ambient_sound: 持续不断的雷鸣、谷底传来的低频脉冲嗡鸣、风声在崖壁间回荡的呜咽
  - id: rift_valley_floor
    name: 裂谷盆地
    description: '裂谷的底部是一片潮湿的沼泽地带。地面覆盖着一层黏稠的赤红色泥浆， 每一步都需要用力拔腿。上万棵锥形小石树密密麻麻地铺满了整个视野， 它们的表面散发出微弱的生物荧光——是活的，在呼吸。成群的巨蛛族 工蚁形态在这些石树之间穿梭，用它们粗短的铲状前肢搬运着一坨坨 乳白色的胶结物，不停地修补和扩建这些石树结构。空气中弥漫着一种 浓烈的、类似烧焦糖浆的化学气味。在石树群的最深处，几个巨大的、 如同教堂穹顶般的石质结构若隐若现——那是某种巢穴，或是某种工厂。 你脚下的大地在节奏性地颤动，似乎有某种巨大的东西在地底深处移动。

      '
    connections:
      up: rift_valley_edge
      deeper: giant_hive
    ambient_light: 成千上万棵石树的生物荧光交织成一片幽暗的蓝绿色光海
    ambient_sound: 巨蛛族工蚁形态挖掘和搬运的持续声响、地底深处传来的沉闷轰隆、某种巨大生物的缓慢呼吸声
  - id: giant_hive
    name: 巨型巢穴结构
    description: '裂谷最深处的核心——一个由乳白色胶结物堆砌而成的巨型穹顶结构， 高度至少有两百米。它的表面密密麻麻地布满了蜂巢般的六角形孔洞， 每一个洞口都足够一个成年人爬进去。从孔洞中泄漏出温暖的、带有酸味 的气流，以及某种持续的低频振动——不是声音，而是直接震颤你的骨骼。 穹顶的外墙上嵌着被钙化的金属结构——那不是巨蛛族的造物，而是 帝国战舰的残骸。第140远征舰队的几艘登陆舰被整个拖进了 这个巢穴，船体已经被胶结物半融化、半包裹，成为结构的一部分。 如果还有血天使幸存者被带进了这里面，他们可能还活着—— 巨蛛族似乎会保存一些猎物，而不是立即杀死。巢穴顶端有一根 巨大的棘刺塔直指天际，每一次闪电都精准地劈在塔尖上， 将能量灌入地底。

      '
    connections:
      back: rift_valley_floor
    ambient_light: 穹顶孔洞中泄漏出的暖黄色生物光
    ambient_sound: 低频骨骼振动、数百个孔洞中传出的各种形态的窸窣和嘶鸣、闪电击中棘刺塔的规律性爆裂声
  - id: underground_nest_entrance
    name: 地下巢穴入口
    description: '棘刺树丛下方一个被巨蛛族挖掘出来的垂直竖井。井壁由硬化的胶结物 加固，直径约有十米，深不见底。从井底涌上来的气流温暖而潮湿， 带着一股浓重的、如同发酵腐肉般的臭味。井壁上密密麻麻地爬满了 幼虫囊——比草茎根部的那些更大、更活跃，它们在微弱地蠕动。 每隔几秒钟，井底会传来一阵如同金属锻造般的有节奏的撞击声： 砰——砰——砰——。这不是心跳。这是某种巨大形态的巨蛛族在 地底加工某种东西。一根粗如人臂的有机缆线从井口垂入黑暗深处， 缆线上附着着发光的生物节点，一直延伸到看不见的底部。

      '
    connections:
      up: thorn_tree_grove
      down: brood_chamber
    ambient_light: 井壁上的生物发光节点提供断断续续的蓝绿色微光
    ambient_sound: 持续的金属锻造撞击声、幼虫囊蠕动的黏腻声响、气流穿过竖井的低沉呜咽
  - id: brood_chamber
    name: 孵化室
    description: '竖井底部的巨大地下洞窟。洞壁由乳白色胶结物完全覆盖，形成了 无数个六角形的孵化单元格——每一个单元格里都蜷缩着一个人形的 影子。不是巨蛛族。是人。帝国陆军的士兵、舰队的技术人员、 记述者——他们的身体被胶结物半包裹固定，头颅低垂，身上连着 数十根细如发丝的生物管线。他们还活着。你在洞窟远端的墙上 看到了赤红的第九军团标记——至少三名血天使被用更粗的管线 连接到了一台由活体组织和金属零件拼接而成的畸形装置上。 他们的基因种子正在被抽取。这是巨蛛族真正想要的东西。

      '
    connections:
      up: underground_nest_entrance
    ambient_light: 孵化单元格的生物荧光和抽取装置上闪烁的不稳定电弧
    ambient_sound: 数百个心跳声交织在一起的低频嗡鸣、生物管线中液体流动的汩汩声、被囚者偶尔发出的微弱呻吟
  objects:
  - id: drop_pod_13
    object_type: device
    name: 第十三号空降舱残骸
    description: 塔尔维茨的第十三号空降舱，在穿过风暴层时被闪电击中三次，落地时已经半毁。舱内的通讯设备完全烧毁，但部分弹药和医疗补给得以保存。舱体裂口处可以看到塔尔维茨用战斗刀在舱壁上刻下的一行字：'第十连在此——活着。'
    position:
      x: 0
      y: 0
      z: 0
    state:
      comms_destroyed: true
      ammo_remaining: partial
      hull_breached: true
    properties:
      material: ceramite_and_plasteel
      capacity: 搭载十二名阿斯塔特
      damage: 闪电击穿x3_结构完整性38%
  - id: thorn_tree_first
    object_type: decoration
    name: 石棘刺巨树
    description: 一棵高五十米的石化巨树，巨蛛族用来悬挂和储存猎物的生物结构。半球形的树冠由数千根锋利的白石化棘刺构成——这些棘刺的硬度堪比钻石。树干粗达十米，由一种乳白色的钙化胶结物构成，与巨蛛族自身外壳的材质高度相似。树上目前挂着十二具帝王之子的尸体。他们的基因种子已被摘除。
    position:
      x: 15
      y: 0
      z: 5
    state:
      feeding_active: true
      imperial_remains_present: true
    properties:
      material: calcified_biocement
      height_m: 50
      purpose: prey_storage_and_feeding_station
      hardness: near_diamond
  - id: megarachnid_blade_limb
    object_type: weapon
    name: 巨蛛族刀肢（战利品）
    description: 卢修斯在第一场交战中从一只被他击伤的巨蛛族身上砍下来的刀状前肢。长一米，细如人腕，弯曲如剑，材料看起来像是经过打磨的锌或镀锌铁——但它是活的、从巨蛛族的身体里长出来的。刀尖锋利到卢修斯一握就把自己的手套割穿了。关节处可以看到金属外壳-几丁质内鞘-粉色肌肉的剖面三层结构。
    position:
      x: 14
      y: 0.5
      z: 4
    state:
      severed: true
      still_sharp: true
    properties:
      weapon_type: natural_xenos_blade
      material: bio-metallic_composite
      sharpness: monomolecular_edge
      origin: megarachnid_warrior_clade
  - id: blood_angel_helm
    object_type: decoration
    name: 血天使遗骸头盔
    description: 挂在棘刺树丛中的一顶破碎的赤红色阿斯塔特头盔。第九军团——圣血天使——的标志还依稀可见：一滴血泪。头盔内部的制造标记显示它属于索罗斯连长。他的遗体已经与棘刺树融为一体。这顶头盔是圣吉列斯（Sanguinius）后来唯一能够辨认的遗物。
    position:
      x: 25
      y: 2
      z: 15
    state:
      cracked: true
      blood_angel_heraldry_visible: true
    properties:
      material: ceramite
      original_owner: captain_thoros_blood_angels
      legion: IX_Blood_Angels
      significance: only_recoverable_relic
  - id: explosive_cache
    object_type: container
    name: 爆破装药箱
    description: 一个从空降舱残骸中回收的金属弹药箱，里面装着十二枚标准工兵爆破装药——用于拆除防御工事或重型装甲目标。也正是这些装药让塔尔维茨能够炸毁棘刺树，为散落的部队提供了烟柱信号。目前剩余六枚。每一枚都可能在关键时刻决定生死。
    position:
      x: 1
      y: 0
