  speech_examples:
  - 它们……不是野兽。它们是有目的的。它们要我们的基因。我们的种子。它们在收割阿斯塔特。
  - 索罗斯连长死了。他让其他人先走。他坚持了三天，然后这机器——吸干了他。
  - 我还有一个——（艰难地从口中取出藏着的基因种子腺体）——这是他们的。不是我一个人的。
