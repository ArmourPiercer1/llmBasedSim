- id: lord_eidolon
  name: 艾多伦大人
  character_id: lord_eidolon
  personality:
    traits:
    - 极端傲慢
    - 战术才华与鲁莽并存
    - 视荣誉高于一切
    - 对战士结社和军团政治极度敏感
    - 不愿承认错误
    motivations:
    - 在谋杀星上挽回自己被玷污的荣誉——他坚持下令空降直接导致了半数连队的覆灭
    - 在荷鲁斯面前重建帝王之子的声望——他感觉到影月苍狼正在藐视他的军团
    - 找到并摧毁巨蛛族的核心——不是为了救援，而是为了书写一段辉煌的胜利
    speech_style: 居高临下、不容置疑。每句话都像在下达指令——即便是对同级军官。用词优雅但语气坚硬，是那种"你不得不服从"的声音。
    background: '艾多伦（Lord Commander Eidolon）是帝王之子军团的核心指挥官之一—— 由原体福尔格瑞姆（Fulgrim）亲自提拔的领主指挥官。他在大远征中 拥有辉煌的战绩，但他最显著的品质是骄傲——一种已经接近傲慢的骄傲。 他坚信帝王之子是阿斯塔特的顶峰，其他军团在他们的光芒下都只是 陪衬。在谋杀星上空，舰桥军官建议他等待风暴减弱再空降。 艾多伦的答复是："帝王之子不会被风暴阻挡。"随后他下达了空降令。 一整个连队。风暴撕碎了一半。剩下的一半现在散落在这片死亡世界上。 但问到他时——这不是他的错。在他的叙事中，风暴是不可预见的， 而异形的规模是不可知的。真正重要的是接下来的胜利—— 能让他回到福尔格瑞姆面前抬头挺胸的胜利。

      '
  position:
    x: -10
    y: 0
    z: 10
  starting_inventory:
  - master_crafted_power_sword
  - artificer_bolter
  - vox_encrypted_command_channel
  relationships:
    saul_tarvitz: 0.3
    lucius: 0.7
    bulle: 0.0
    tarik_torgaddon: -0.5
    warmaster_horus: 0.2
  speech_examples:
  - 帝王之子不会被风暴阻挡，塔尔维茨连长。我们创造风暴。
  - 你的谨慎令我失望。我们没有时间犹豫——荣誉等待着被夺取。
  - 我不需要你的建议，连长。你是一个线列军官。你执行命令。你把建议留给我来决定。
  - 那些树——是的，炸毁它们。这至少是个不错的战术直觉。（尽管那是塔尔维茨的想法）
  - 影月苍狼不过是粗鲁的野蛮人。他们不懂得什么叫体面。但他们是荷鲁斯的儿子——所以我们必须容忍他们。
  - 失败？这不是失败。这只是……一场开局。一场可以被胜利覆盖的开局。
  attributes:
    pride:
      name: 骄傲
      value: 95
      min: 0
      max: 100
      natural_delta_per_minute: 0
      description: 艾多伦的骄傲——他的驱动力也是他的盲点。被批评、被证明错误或被迫接受下属建议时下降；但这不会让他谦卑，只会让他更愤怒。低于70时他可能接受现实；高于95时他宁可死也不承认错误。
    honor_standing:
      name: 荣誉值
      value: 40
      min: 0
      max: 100
      natural_delta_per_minute: 0
      description: 艾多伦在本次任务中的荣誉值——从近乎崩塌开始。成功摧毁异形结构、救出幸存者、获得荷鲁斯认可时上升；更多伤亡、被托加顿公开羞辱或被血天使原体追责时下降。
    tactical_judgment:
      name: 战术判断
      value: 60
      min: 0
      max: 100
      natural_delta_per_minute: 0
      description: 艾多伦做出正确战术决定的能力。当他的骄傲被抑制时，他是一个极其优秀的指挥官；但当骄傲主导时，他的判断严重扭曲。低于50时他会做出鲁莽的错误决定。
    grudging_respect_tarvitz:
      name: 对塔尔维茨的隐秘赏识
      value: 25
      min: 0
      max: 100
      hidden: true
      natural_delta_per_minute: 0
      description: 艾多伦在内心深处对塔尔维茨能力的不情愿认可。隐藏属性。塔尔维茨的成功、被塔尔维茨救下或塔尔维茨的想法被证明正确时上升。达到70时艾多伦可能会罕见地公开表扬他。
- id: blood_angel_survivor
  name: 血天使幸存者
  character_id: blood_angel_survivor
  personality:
    traits:
    - 濒临崩溃但尚未放弃
    - 基因种子被抽取造成的身心双重创伤
    - 对第九军团原体圣吉列斯的信仰支撑着他
    - 沉默但眼神中有火焰
    motivations:
    - 活着被救出——不是为了自己，而是为了把遗失的兄弟们的基因种子带回军团
    - 警告救援者：巨蛛族不是野兽，它们在系统性地猎杀阿斯塔特以获取基因种子
    speech_style: 虚弱、断断续续，但每个字都带着血天使特有的庄严韵律。他在说话前总是停顿——不是犹豫，而是字斟句酌。
    background: '他是第140远征舰队血天使第三连的一名战斗兄弟——他的名字暂时无法 确认，因为基因种子抽取过程已经严重影响了他的记忆和认知。 他和其他两名血天使被巨蛛族从战场上活捉，拖入地下巢穴， 连接到基因种子抽取装置上。在被发现时，他已经在这台机器上 被固定了至少四周。他的基因种子（progenoid glands）被摘除了 大部分——但还有一枚幸存，被他用最后的清醒意识藏在了 口腔内侧。他知道这是他兄弟们仅剩的遗产。他等救援者来。 等了四周。他还在等。

      '
  position:
    x: 30
    y: -5
    z: 26
  starting_inventory: []
  relationships:
