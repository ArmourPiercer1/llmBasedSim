    lucius: 0.3
    lord_eidolon: -0.1
    sakian: 0.7
  speech_examples:
  - 连长，棘刺树不是艾多伦大人炸的。是你。我在场。我看到了。
  - 我不在乎什么荣誉。我在乎的是我们能带着多少兄弟活着回到舰队。
  - 那个东西——（指向巨蛛族尸体）——它不是武器。它是一条手臂。他在挥一条手臂。
  - 给我装药。我去安。如果我回不来——装药的位置是对的。
  attributes:
