world:
  name: 耳语山
  description: '第六十三之十九号世界南半球的极高山脉，当地人称之为"耳语山"。 古老的冰川在亿万年间雕刻出陡峭的冰崖、深渊裂缝和天然石桥。 山巅的要塞曾是这颗星球上最古老的祭祀场所——早在伪帝统一全球之前， 某个更古老、更黑暗的力量就被囚禁在此处的深渊之中。
    如今，伪帝死后，叛乱分子逃入这座要塞负隅顽抗。帝国军已经在山脚下 消耗了六个星期，尸体铺满了石桥。现在，阿斯塔特来了。 凌晨的寒风刺骨，稀薄的空气让凡人难以呼吸，山巅的白光耀眼夺目。 而Vox通讯频道中，一个名为"Samus"的声音正在低语。

    '
  environment:
    time_of_day: 清晨
    weather: 严寒，山风凛冽，高海拔薄雾
    temperature_c: -15.0
  locations:
  - id: plateau
    name: 着陆平台
    description: '一片干燥的白色火山岩高台，海拔约五千米。风暴鸟运输机的引擎轰鸣声 渐渐消散，扬起阵阵浮石灰尘。从这里可以仰望耳语山最高峰的冰冠—— 叛乱分子的要塞就嵌在那些白得刺眼的峭壁之间。平台边缘是冰蚀峡谷的 万丈深渊，云雾在脚下翻涌。帝国陆军的士兵裹着厚重的防寒大衣，
      戴着呼吸面罩，用不可置信的目光注视着这些从天而降的白色巨人。

      '
    connections:
      north: rock_bridges
      down: kasheri_town
    ambient_light: 刺眼的白日光
    ambient_sound: 风暴鸟引擎渐熄的嗡鸣和山风的呼啸
  - id: rock_bridges
    name: 天然石桥
    description: '一系列由古代冰川侵蚀形成的天然花岗岩石桥，横跨在深不见底的冰蚀峡谷 之上。桥面上散落着数十具帝国军的干尸——他们在六周的徒劳进攻中被叛乱 分子的重炮撕碎，战友甚至无法收回他们的遗体。石桥对面的峭壁上，隐藏 的炮位正严密监视着每一寸推进路线。对凡人而言，这是一片屠场。
      对阿斯塔特而言，这只是一个需要跨越的障碍。

      '
    connections:
      south: plateau
      north: lower_fortress
    ambient_light: 刺眼的白日光，冰面反射令人目眩
    ambient_sound: 山风的尖啸声和远处爆弹枪的轰鸣
  - id: lower_fortress
    name: 下层要塞
    description: '叛乱分子在峭壁上开凿的防御工事群。一座座粗犷的石砌碉堡和火力点 嵌在山体之中，互相以狭窄的隧道相连。刚刚经历过Terminator突击的 洗刷——墙壁上布满爆弹弹坑，焦黑的尸体横七竖八地倒在炮位旁边。 空气中弥漫着硝烟和烧焦血肉的气味。几条隧道向山体深处延伸，
      通向上层隧道网络。角落里堆放着叛乱分子的弹药箱和简陋的铺盖。

      '
    connections:
      south: rock_bridges
      up: upper_tunnels
    ambient_light: 昏暗，只有应急照明和火光
    ambient_sound: 远处零星的枪声、碎石滚落声、风声穿过裂缝的呜咽
  - id: upper_tunnels
    name: 上层隧道网络
    description: '山体内部令人窒息的地下迷宫。天然溶洞与人工凿出的通道交织在一起， 窄处仅容一人侧身通过。墙壁上偶尔可见早已灭绝的古代文明留下的 模糊壁画——那些扭曲的图案令人不安，似乎在描绘某种被囚禁的存在。 Vox信号在这里变得极不稳定，静电噪音中不时传来那个低语：
      "Samus……Samus就在你身边……"空气变得越来越潮湿阴冷， 隐约能听到深处传来水珠滴落的声音。

      '
    connections:
      down: lower_fortress
      deeper: chamber_of_the_well
    ambient_light: 近乎全黑，唯头罩探灯的光束划破黑暗
    ambient_sound: 滴水的回音、Vox频道中的静电低语、自己的呼吸声
  - id: chamber_of_the_well
    name: 深渊之室
    description: '山腹深处一座令人窒息的巨大溶洞。穹顶在黑暗中消失，脚下的石台 悬在一片无底裂缝之上——裂缝中涌出冰冷潮湿的气流，带着远古腐朽的 气味。裂缝边沿有一道古老得不属于任何已知文明的石碑，上面刻满了 无法辨认的文字，那些字在暗处微微发光。水滴从钟乳石上缓缓坠落，
      落入深渊后听不到回响。这里是Samus被囚禁的地方—— 早在人类踏足这颗星球之前，它就在这里等待了。 空气浓稠得仿佛有某种不可见的存在正在注视着你。

      '
    connections:
      back: upper_tunnels
    ambient_light: 绝对黑暗，唯有石碑上的文字发出幽暗的蓝绿色微光
    ambient_sound: 水滴落入深渊的滴答声、似有似无的呼吸声、Vox中愈发清晰的低语
  - id: kasheri_town
    name: Kasheri镇
    description: '耳语山脚下的一座古老山镇。几排粗糙的长屋沿着峡谷谷底分布， 数百年未曾改变过模样。帝国陆军已经把这里变成了临时驻地和后勤中心—— 笨重的坦克停在泥土路边，军需官在长屋之间奔波，伤兵躺在担架上被抬进 临时医疗站。记述者和随军文官被安排在此处"安全地带"等待消息。
      镇子周围的白色草地上散落着古代神殿的废墟——那些黑色的石基比山镇本身 更古老，当地人至今仍会在深夜偷偷前来祭拜。

      '
    connections:
      up: plateau
      east: longhouse_hq
    ambient_light: 清晨的苍白日光透过薄雾
    ambient_sound: 陆军士兵的喊叫声、引擎轰鸣、远处山巅传来的隆隆炮声
  - id: longhouse_hq
    name: 长屋指挥部
    description: '一间被征用的山镇长屋，作为第十连的临时指挥部。厚重的木梁支撑着 低矮的天花板，地面上铺着干燥的草席。十几盏油灯提供着昏暗的暖光。 墙上钉着战术地图和作战简报，一张粗木桌上散落着数据板、Oath of Moment
      卷轴和一把待维护的链锯剑。屋外山风呼啸，木板窗被吹得咔咔作响。 这里也是洛肯私下与心腹交谈的地方——战帅荷鲁斯本人在战后曾在此处 告知洛肯关于亚空间的真相。

      '
    connections:
      west: kasheri_town
    ambient_light: 油灯的昏黄暖光
    ambient_sound: 山风撞击木窗的声响、油灯灯芯的轻微噼啪声
  objects:
  - id: stormbird_landed
    object_type: device
    name: 风暴鸟运输机
    description: 一台庞大的军团运输机，刚刚在着陆平台上熄火。机身上漆着白色的影月苍狼标志，装甲板上有几处新的弹痕。它的货舱里还存放着备用弹药和医疗补给。
    position:
      x: -10
      y: 0
      z: 5
    state:
      landed: true
      engines_warm: true
    properties:
      immovable: true
      material: ceramite_and_plasteel
      capacity: 可搭载三十名阿斯塔特
      armament: 机腹重型爆弹炮
  - id: sentry_gun
    object_type: device
    name: 自动哨戒炮
    description: 叛乱分子部署在隧道中的重型自动武器平台。短粗的炮管连接着自动装弹系统，外壳上遍布弹痕和烧焦的痕迹——已经被第十连的突击摧毁了。旁边散落着一堆黄铜弹壳。
    position:
      x: 3
      y: 0.5
      z: 8
    state:
      destroyed: true
    properties:
      material: reinforced_steel
      weapon_type: heavy_autocannon
      rate_of_fire: extremely_high
  - id: ancient_stele
    object_type: decoration
    name: 远古石碑
    description: 矗立在深渊裂缝边缘的一块黑色石碑，材质似乎不是任何已知的岩石。碑面上刻满了不属于任何人类语言的文字——那些符号在绝对黑暗中自行发光，呈现出幽暗的蓝绿色。碑文的内容似乎是某种囚禁或封印的记述。当地传说称，Samus——这颗星球上的大敌——在远古时代被囚禁于此。
    position:
      x: 2
      y: 0
      z: 15
    state:
      inscriptions_glowing: true
    properties:
      material: unknown_black_stone
      age: predates_human_colonization
      language: unknown
      purpose: contains_or_binds_samus
  - id: jubal_chainsword
    object_type: weapon
    name: 朱巴尔的链锯剑
    description: 泽维尔·朱巴尔的链锯剑，一把标准的阿斯塔特近战武器。剑身上的锯齿依然锋利，但此刻它正插在洛肯的左肩甲上——在深渊之室的搏斗中，朱巴尔用这把剑刺穿了洛肯的肩甲。
    position:
      x: 2
      y: 1
      z: 14
    state:
      stuck_in_loken_pauldron: true
    properties:
      weapon_type: chainsword
      material: adamantium_teeth_ceramite_housing
      owner: xavyer_jubal
  - id: keeler_picter
    object_type: device
    name: 基勒的影像记录器
    description: 尤弗拉提·基勒的影像记录器——一台精密的手持式图像捕捉设备。她在隧道中用它拍下了许多不应被记录的东西。其中包括一张后来被禁止传播的照片：朱巴尔变成的怪物在黑暗的隧道中扑向镜头。
    position:
      x: -5
      y: 0
      z: 18
    state:
      contains_forbidden_footage: true
    properties:
      device_type: pict_recorder
      owner: euphrati_keeler
      evidence_quality: high
  - id: mountain_shrine
    object_type: decoration
    name: 山神殿
    description: Kasheri镇外的一座古老石砌祭坛，已经半埋在白色沙土和干草丛中。黑色的石基上刻着褪色的献祭铭文，本地人至今仍会在深夜偷偷前来摆放祭品——他们相信不这样做的话，山里的声音会变得更响。
    position:
      x: -12
      y: 0
      z: 20
    state:
      weathered: true
      recent_offerings: true
    properties:
      material: black_basalt
      age: ancient
      local_name: the_listening_stone
  - id: loken_oath_papers
    object_type: document
    name: 洛肯的誓言之刻卷轴
    description: 加维尔·洛肯出发前签署的Oath of Moment卷轴。卷轴上以正式的哥特语书写着他对战帅和帝皇的誓言：将叛乱分子从耳语山中清除。在卷轴的末尾，洛肯加了一句手写的附言——'不论敌人使出何种凶残或巧妙的手段。'战帅后来告诉他，正是这句话证明他没有失败。
    position:
      x: -3
      y: 1
      z: 22
    state:
      signed: true
      sealed_with_wax: true
    properties:
      material: parchment
      language: high_gothic
      author: garviel_loken
      witness: warmaster_horus
  - id: terminus_armor_rassek
    object_type: character_equipment
    name: 终结者装甲（拉塞克）
    description: 拉塞克军士长穿戴的Terminator战术装甲——一种最新配发给影月苍狼军团的重型突击装甲。比标准动力甲厚实数倍，行动缓慢但几乎可以无视任何弹道攻击。装甲肩部和臂部内嵌了重型武器系统。拉塞克正是穿着这套装甲带领突击队穿过了石桥的火力网。
    position:
      x: 5
      y: 0
      z: 3
    state:
      battle_ready: true
      fresh_issue: true
    properties:
      armor_type: terminator
      weight_kg: 400
      material: ceramite_and_adamantium
      mobility: slow_but_unstoppable
      special: nearly_impervious_to_ballistic_fire
  - id: rebel_ammo_cache
    object_type: container
    name: 叛乱军弹药箱
    description: 叛乱分子在下层要塞堆积的弹药箱。木箱上印着伪帝国的徽记——一只展翅的金鹰，如今已经过时了。箱子里装着能量武器电池包、重型爆弹弹夹和几枚破片手雷。
    position:
      x: 4
      y: 0
      z: 6
    state:
      half_empty: true
    properties:
      contents: energy_cells_bolter_mags_frag_grenades
      material: wood_and_metal
      markings: false_imperium_eagle
player:
  player_id: player_1
  name: 加维尔·洛肯
  persona: '加维尔·洛肯（Garviel Loken），影月苍狼第十连连长。阿斯塔特军团中 一位年轻而卓越的军官，刚被选入战帅荷鲁斯的私人顾问团Mournival。 他的面容坚毅而英俊——银色的短发、淡灰如雨的眼睛、布满旧伤疤的 结实肌肉。他是一位冷静审慎的战术家，对帝国真理深信不疑：
    没有鬼神、没有妖灵、没有超自然。宇宙中只有理性和人类尚未理解的科学。 但这种信念即将面临最严峻的考验。他对兄弟们极度忠诚，对部下负责到 近乎自责的程度。私底下，他有一些不为人知的柔软面——他喜欢阅读古代 诗歌（尤其是苏美尔时代的），并在战帅面前像儿子面对父亲一般坦诚。
    他不喜欢战士结社（lodge）的秘密活动，尽管整个军团都在默许它们存在。

    '
  position:
    x: 0
    y: 0
    z: 0
  capabilities:
    sight_range_m: 100.0
    hearing_range_m: 200.0
    field_of_view_degrees: 180.0
    special_senses:
    - 阿斯塔特超人视觉——可在近乎全黑中辨识目标
    - 阿斯塔特超人听觉——可过滤背景噪音聚焦特定声源
    - 可切换头盔显像模式以侦测热能/运动/隐身单位
    - 通过Vox通讯指挥第十连全部战力
    allowed_extraordinary_actions:
    - 指挥第十连阿斯塔特部队——包括Locasta战术小队和Terminator突击队
    - 以战帅Mournival成员的身份与最高指挥部直接通讯
    - 凭借超人基因改造的身体能力碾压任何凡人对手
    - 调用风暴鸟空中支援和轨道侦察数据
    blocked_common_actions:
    - 对阿斯塔特兄弟使用致命武力——这违反了基因编码本身的铁律
    - 在官方场合承认超自然/鬼神/恶魔的存在——这是对帝国真理的亵渎
    - 未经请示擅自改变战帅的作战部署
    skill_levels:
      chainsword: 0.9
      bolter_marksmanship: 0.85
      tactical_command: 0.9
      diplomacy: 0.7
      warp_lore: 0.1
      deciphering_ancient_texts: 0.05
  physical_profile:
    height_cm: 250.0
    weight_kg: 320.0
    body_width_cm: 120.0
    movement_mode: power_armour_assisted
    strength: 0.95
  attributes:
    stamina:
      name: 体力
      value: 95
      min: 0
      max: 100
      natural_delta_per_tick: 0.5
      description: 阿斯塔特的超人耐力。战斗、突击、扛重物时加速消耗；待命或休整时缓慢恢复。
    resolve:
      name: 意志
      value: 90
      min: 0
      max: 100
      natural_delta_per_tick: 0
      description: 精神坚毅程度。面对Samus的低语、不可名状的恐怖时受到考验；成功克服恐惧后缓慢恢复。
    imperial_truth_devotion:
      name: 对帝国真理的信奉
      value: 85
      min: 0
      max: 100
      natural_delta_per_tick: 0
      description: 对唯物主义世界观的信念强度。目睹超自然现象（尸体复生、混沌附身）时被动摇；获得科学解释时可部分恢复。
    brotherhood_trust:
      name: 兄弟信任
      value: 80
      min: 0
      max: 100
      natural_delta_per_tick: 0
      description: 对阿斯塔特兄弟的信赖程度。目睹兄弟背叛或被附身时崩溃式下降；并肩作战时缓慢提升。
    sanity:
      name: 理智
      value: 88
      min: -100
      max: 100
      natural_delta_per_tick: 0
      description: 对战锤40000残酷宇宙的心理承受力。暴露于混沌污染、极度暴力或违背常理的恐怖时下降。低于30可能引发短时幻觉或冲动行为。
    cold_resistance:
      name: 抗寒
      value: 90
      min: 0
      max: 100
      natural_delta_per_tick: 0
      description: 耳语山极端低温环境（-15°C）下的抗寒能力。动力装甲提供额外保护；长时间暴露于高山寒风时缓慢下降。
    vox_integrity:
      name: 通讯稳定度
      value: 60
      min: 0
      max: 100
      natural_delta_per_tick: -2
      description: Vox通讯频道的稳定程度。深入山腹越深，Samus的低语越强，通讯越不稳定；返回开阔地带或重启设备可恢复。
    corruption_resistance:
      name: 混沌抗性
      value: 100
      min: 0
      max: 100
      hidden: true
      natural_delta_per_tick: 0
      description: 抵抗亚空间腐败的内在屏障。此值对玩家隐藏。当Samus的低语被听到、接触混沌附身者或在恐怖面前意志动摇时下降。降至0可能导致改变。
  subconscious_rules:
  - '规则1: 帝国真理是唯一的真理。任何看似''超自然''的现象都一定有科学解释。绝不在公开场合使用''鬼神''、''恶魔''或''附身''这类字眼。'
  - '规则2: 对兄弟的忠诚至高无上。阿斯塔特之间不能兵刃相向——这比死亡更不可接受。当证据指向兄弟背叛时，第一反应永远是寻找其他解释。'
  - '规则3: 对战帅荷鲁斯的忠诚是绝对的。但私下里，你可以像对父亲一样对他提出疑问——他尊重这一点。'
  - '规则4: 你是一个隐藏在战士外壳下的思考者。面对未知时，你的本能是观察、分析和理解，而不是恐慌。但一旦理解不了，你的世界观就会出现裂痕。'
  subconscious_memory:
  - 六个月前，在伪帝的黄金王座上，你亲眼看着战帅荷鲁斯降临——那一幕的神圣感你至今无法用语言描述。他是如此……美丽。
  - 战帅私下告诉你，亚空间（the warp）中存在着会'改变一个人'的力量。他说他亲眼见过。但他也说不存在什么鬼神——'只是异次元的异形生命，用旧的词汇称呼它们并无不妥。'
  - 你在清理朱巴尔的遗物时发现了一枚银色的战士结社勋章——一枚狼头衬着新月的硬币大小徽章。你还没来得及追问，这枚勋章就神秘消失了。
  - 尼禄·维普斯是你最老的朋友。你们一起经历了乌拉诺战役的泥泞、伪帝皇宫的走廊、以及无数次生死时刻。你信任他的判断胜过自己的。
  - 辛德曼教导你：'万事万物都有理性的解释。神话是解释的失败，而非事实。'你一直相信这句话。但是——耳语山区那些刻在石碑上的文字，为什么在你阅读时会在暗处发光？
  speech_examples:
  - 我不需要知道敌人的名字才能杀死他。我只用知道他在哪里。
  - 我们是阿斯塔特。恐惧不是我们基因里该有的东西。
  - 兄弟之间，不该有秘密。但我开始怀疑，这座军团的秘密比我想象的要多得多。
  - 如果帝国真理解释不了我们在这里看到的东西……那么我们为之奋斗的，究竟是什么？
  - 尼禄，你是我的副官。我选你，不是因为规则，而是因为信任。
  - 战帅曾对我说——'我今天看到的，如果不是恶魔，那就是亚空间中某种我们还无法命名的事物。'这话当时让我安心。现在却让我不安。
