starting_scene_description: '寒风如刀，撕扯着耳语山五千公尺高空的每一寸裸露岩石。风暴鸟运输机的 引擎轰鸣刚刚消散在稀薄的空气中，第十连的战士们正从机舱中鱼贯而出—— 白色的马克IV型动力装甲在刺眼的白日光下几乎融入冰原的背景。

  你是加维尔·洛肯，第十连连长，影月苍狼中最年轻的连级指挥官之一。

  Vox通讯频道里，除了兄弟们的战术简令，还有一个你无法忽视的声音—— 干燥得如同沙漠之风的低语，一遍遍地重复着同一句话：

  "Samus。你将只听到这个名字。Samus。它意味着终结。和死亡。Samus。 我是Samus。Samus无处不在。Samus是你身边的人。Samus会啃噬你的白骨。 小心！Samus在此。"

  你的战士们假装不在意。你假装不在意。但你们都知道——这不是干扰信号。

  前方，天然石桥横跨万丈深渊，直通叛乱分子的高山要塞。帝国陆军已经 在这些石桥上铺满了他们的尸体。你的任务是：带着第十连碾过石桥，肃清要塞， 然后在山腹深处找到叛乱分子的首领——那个被称为"隐形人"的指挥官。

  Terminator小队军士长拉塞克在你左侧待命，他那庞大的终结者装甲在惨白的 日光下像一座可移动的堡垒。右侧，Locasta小队军士长尼禄·维普斯—— 你最好的朋友——朝你竖起被机械义肢取代的右手拇指，金属关节在寒风中 发出轻微的咔嗒声，算是大战前的最后一个冷笑话。

  而你最资深的军士——泽维尔·朱巴尔——站在几米开外。他脸上的阴沉你已经 看了好几个星期。你选择把突击先锋的荣耀交给他，试图弥补你提拔维普斯 而非他的决定。他轻轻点了点头，但你不确定那是否意味着原谅。

  山脚下的小镇Kasheri传来通讯员的消息：记述者基勒坚持要求上前线， 诗人卡卡西还在酗酒闹事被关禁闭，而你年老的首席记述者导师辛德曼 正在查阅舰队数据库——他刚刚发现"Samus"这个名字属于当地神话中的 远古大敌，据说它被囚禁在这些山的最深处。

  石桥上的狂风吹来干涸的血腥味。你的Oath of Moment卷轴在肩甲下 微微发紧。战帅荷鲁斯在你出发前私下告诉你：快速推进，勿问太多。

  你深吸一口稀薄冰冷的空气，向前迈出第一步。

  '
